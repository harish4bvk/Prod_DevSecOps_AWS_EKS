# ==============================================================
# DevSecOps CI/CD Pipeline
# ==============================================================
# Triggers on every push and pull request.
# Stages: Build → Unit Test → SAST (SonarQube) → SCA (Black Duck) → Docker Build → Image Scan (Trivy) → Push to ECR
# ==============================================================

name: DevSecOps CI Pipeline

on:
  push:
    branches: [ main ]

env:
  AWS_REGION: ap-south-1
  ECR_REPO: <your-ecr-repo>

jobs:
  ci:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v3

      # -------------------------
      # Build
      # -------------------------
      - name: Build
        run: |
          npm install
          npm run build

      # -------------------------
      # Unit Tests
      # -------------------------
      - name: Unit Test
        run: npm test

      # -------------------------
      # SonarQube Scan
      # -------------------------
      - name: Sonar Scan
        run: |
          sonar-scanner \
            -Dsonar.projectKey=your-project \
            -Dsonar.host.url=${{ secrets.SONAR_HOST }} \
            -Dsonar.login=${{ secrets.SONAR_TOKEN }}

      # -------------------------
      # Quality Gate (FAIL pipeline)
      # -------------------------
      - name: Sonar Quality Gate
        run: |
          sleep 20
          STATUS=$(curl -s -u ${{ secrets.SONAR_TOKEN }}: \
          "${{ secrets.SONAR_HOST }}/api/qualitygates/project_status?projectKey=your-project" | jq -r .projectStatus.status)

          if [ "$STATUS" != "OK" ]; then
            echo "Quality Gate Failed"
            exit 1
          fi

      # -------------------------
      # Black Duck Scan
      # -------------------------
      - name: Black Duck Scan
        run: |
           npm audit --audit-level=high || true
           # For a real Black Duck scan, you would run the Detect script:
      #    bash <(curl -s https://detect.synopsys.com/detect.sh) \
      #    --blackduck.url=${{ secrets.BLACKDUCK_URL }} \
      #    --blackduck.api.token=${{ secrets.BLACKDUCK_TOKEN }} \
      #    --detect.policy.check.fail.on.severities=CRITICAL,HIGH

      # -------------------------
      # Configure AWS
      # -------------------------
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      # -------------------------
      # Login to ECR
      # -------------------------
      - name: Login to ECR
        run: |
          aws ecr get-login-password --region $AWS_REGION \
          | docker login --username AWS --password-stdin ${{ secrets.ECR_REGISTRY }}

      # -------------------------
      # Docker Build
      # -------------------------
      - name: Build Docker Image
        run: |
          docker build -t $ECR_REPO:${{ github.sha }} .

      # -------------------------
      # Trivy Scan (FAIL if vuln)
      # -------------------------
      - name: Trivy Scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: $ECR_REPO:${{ github.sha }}
          exit-code: 1
          severity: CRITICAL,HIGH

      # -------------------------
      # Push Image
      # -------------------------
      - name: Push Image
        run: |
          docker tag $ECR_REPO:${{ github.sha }} ${{ secrets.ECR_REGISTRY }}/$ECR_REPO:${{ github.sha }}
          docker push ${{ secrets.ECR_REGISTRY }}/$ECR_REPO:${{ github.sha }}

      # -------------------------
      # Update GitOps Repo
      # -------------------------
      - name: Update Manifest
        run: |
          sed -i "s|image:.*|image: ${{ secrets.ECR_REGISTRY }}/$ECR_REPO:${{ github.sha }}|" k8s/deployment.yaml
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git commit -am "Update image tag"
          git push origin main